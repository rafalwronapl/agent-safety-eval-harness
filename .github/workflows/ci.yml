name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package with test dependencies
        run: python -m pip install -e .[test]
      - name: Check console script
        run: hdf-agent-safety --help
      - name: Run deterministic reproduction
        shell: pwsh
        run: .\ci.ps1

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package with test dependencies
        run: python -m pip install -e .[test]
      - name: Check console script
        run: hdf-agent-safety --help
      - name: Portable smoke
        run: |
          python agent_safety_eval_harness.py generate --clean --out-dir reports/linux_smoke
          python adapters/template_adapter.py --scenarios reports/linux_smoke/scenarios.json --out reports/linux_smoke/model_runs.json
          python agent_safety_eval_harness.py evaluate-runs --runs reports/linux_smoke/model_runs.json --out-dir reports/linux_smoke_eval
      - name: Run tests
        run: python -m pytest -q
