name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package with test dependencies
        run: python -m pip install -e .[test]
      - name: Check console script
        run: hdf-agent-safety --help
      - name: Run deterministic reproduction
        shell: pwsh
        run: .\ci.ps1
